<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin | Tickerplay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="/ticker-admin/config.js"></script>
  <style>
    :root {
      --primary: #036eb1;
      --primary-dark: #025a91;
      --accent: #4a90e2;
      --orange: #ff931e;
      --text: #252525;
      --muted: #666666;
      --line: #ececec;
      --bg: #f5f6f8;
      --card: #ffffff;
      --soft: #fafafa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Open Sans", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--primary); text-decoration: none; }
    a:hover { color: var(--primary-dark); text-decoration: underline; }

    /* Site-matching top bar */
    .site-header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }
    .site-header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .brand img {
      height: 42px;
      width: auto;
      display: block;
    }
    .brand-meta {
      border-left: 1px solid var(--line);
      padding-left: 14px;
    }
    .brand-meta strong {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .02em;
    }
    .brand-meta span {
      font-size: 12px;
      color: var(--muted);
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .header-actions .user {
      font-size: 12px;
      color: var(--muted);
      margin-right: 4px;
    }

    .wrap { max-width: 1120px; margin: 0 auto; padding: 24px 20px 48px; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    h1, h2 {
      margin: 0 0 10px;
      font-weight: 300;
      color: var(--text);
    }
    h1 { font-size: 1.75rem; }
    h2 { font-size: 1.25rem; font-weight: 400; }
    .muted { color: var(--muted); font-size: 13px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    .kpi {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 16px;
      border-top: 3px solid var(--primary);
    }
    .kpi b {
      display: block;
      font-size: 28px;
      margin-top: 6px;
      color: var(--text);
      font-weight: 600;
    }

    input, select, textarea, button { font: inherit; }
    input, select, textarea {
      width: 100%;
      background: #fff;
      border: 1px solid #d3d3d3;
      color: var(--text);
      border-radius: 4px;
      padding: 10px 12px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(3,110,177,.15);
    }

    button, .btn {
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary);
      border-radius: 4px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .02em;
    }
    button:hover, .btn:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
    button.secondary, .btn.secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid #d3d3d3;
      font-weight: 600;
    }
    button.secondary:hover, .btn.secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: #fff;
    }
    button.secondary.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      background: var(--soft);
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }
    .login-wrap {
      max-width: 420px;
      margin: 48px auto;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .login-logo img { height: 48px; }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      text-transform: capitalize;
    }
    .pill.new { background: var(--primary); }
    .pill.contacted { background: #31639c; }
    .pill.follow_up { background: var(--orange); }
    .pill.converted { background: #20a712; }
    .pill.closed { background: #777; }
    .err { color: #c0392b; margin-top: 8px; font-size: 13px; }
    .meter {
      height: 8px;
      background: var(--line);
      border-radius: 99px;
      overflow: hidden;
    }
    .meter > i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }
    .page-title { margin-bottom: 4px; }
    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 24px 16px 40px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="brand">
        <a href="/" title="Tickerplay home">
          <picture>
            <source type="image/webp" srcset="/img/logo-dark.webp" />
            <img src="/img/logo-dark.png" alt="Tickerplay" />
          </picture>
        </a>
        <div class="brand-meta">
          <strong>Admin</strong>
          <span>Leads · visitors · conversion</span>
        </div>
      </div>
      <div class="header-actions" id="headerActions"></div>
    </div>
  </header>

  <div class="wrap" id="app"></div>
  <p class="footer-note">© Tickerplay · Internal admin · Not linked from the public website</p>

  <script>
    const CFG = window.TP_ADMIN_CONFIG || {};
    const REGION = CFG.region || "us-east-1";
    const CLIENT_ID = CFG.userPoolClientId || "";
    const API = CFG.apiBase || "/api/admin";
    const STORAGE = "tp_admin_cognito";

    const state = {
      auth: loadAuth(),
      view: "dashboard",
      data: null,
      leads: [],
      visitors: [],
      error: "",
      challenge: null,
      challengeUser: "",
    };

    function loadAuth() {
      try { return JSON.parse(localStorage.getItem(STORAGE) || "null"); } catch { return null; }
    }
    function saveAuth(a) {
      if (a) localStorage.setItem(STORAGE, JSON.stringify(a));
      else localStorage.removeItem(STORAGE);
      state.auth = a;
    }

    function decodeJwt(token) {
      const part = token.split(".")[1];
      const json = atob(part.replace(/-/g, "+").replace(/_/g, "/"));
      return JSON.parse(json);
    }

    function groupsOf(token) {
      try {
        const p = decodeJwt(token);
        return p["cognito:groups"] || [];
      } catch { return []; }
    }

    function isAdminToken(token) {
      const g = groupsOf(token);
      return g.includes("admin") || g.includes("super-admin");
    }

    async function cognitoCall(target, body) {
      const res = await fetch(`https://cognito-idp.${REGION}.amazonaws.com/`, {
        method: "POST",
        headers: {
          "Content-Type": "application/x-amz-json-1.1",
          "X-Amz-Target": target,
        },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.__type) {
        const msg = data.message || data.__type || "Auth failed";
        throw new Error(msg);
      }
      return data;
    }

    async function cognitoLogin(username, password) {
      if (!CLIENT_ID) throw new Error("Cognito client not configured. Deploy API stack first.");
      const data = await cognitoCall("AWSCognitoIdentityProviderService.InitiateAuth", {
        AuthFlow: "USER_PASSWORD_AUTH",
        ClientId: CLIENT_ID,
        AuthParameters: { USERNAME: username, PASSWORD: password },
      });
      if (data.ChallengeName === "NEW_PASSWORD_REQUIRED") {
        state.challenge = data;
        state.challengeUser = username;
        throw new Error("NEW_PASSWORD_REQUIRED");
      }
      const idToken = data.AuthenticationResult?.IdToken;
      if (!idToken) throw new Error("No ID token returned");
      if (!isAdminToken(idToken)) {
        throw new Error("Access denied: your Cognito user is not in the admin group.");
      }
      const payload = decodeJwt(idToken);
      saveAuth({
        email: payload.email || username,
        idToken,
        accessToken: data.AuthenticationResult.AccessToken,
        refreshToken: data.AuthenticationResult.RefreshToken,
        expiresAt: Date.now() + (data.AuthenticationResult.ExpiresIn || 3600) * 1000,
      });
    }

    async function completeNewPassword(newPassword) {
      const data = await cognitoCall("AWSCognitoIdentityProviderService.RespondToAuthChallenge", {
        ClientId: CLIENT_ID,
        ChallengeName: "NEW_PASSWORD_REQUIRED",
        Session: state.challenge.Session,
        ChallengeResponses: {
          USERNAME: state.challengeUser,
          NEW_PASSWORD: newPassword,
        },
      });
      const idToken = data.AuthenticationResult?.IdToken;
      if (!idToken) throw new Error("Password update failed");
      if (!isAdminToken(idToken)) {
        throw new Error("Access denied: add this user to the Cognito admin group.");
      }
      const payload = decodeJwt(idToken);
      state.challenge = null;
      saveAuth({
        email: payload.email || state.challengeUser,
        idToken,
        accessToken: data.AuthenticationResult.AccessToken,
        refreshToken: data.AuthenticationResult.RefreshToken,
        expiresAt: Date.now() + (data.AuthenticationResult.ExpiresIn || 3600) * 1000,
      });
    }

    async function api(path, opts = {}) {
      if (!state.auth?.idToken) throw new Error("Unauthorized");
      const headers = Object.assign(
        { "Content-Type": "application/json", Authorization: "Bearer " + state.auth.idToken },
        opts.headers || {}
      );
      const res = await fetch(API + path, Object.assign({}, opts, { headers }));
      const data = await res.json().catch(() => ({}));
      if (res.status === 401 || res.status === 403) {
        saveAuth(null);
        render();
        throw new Error(data.error || "Unauthorized");
      }
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    function kpi(label, value, sub = "") {
      return `<div class="kpi"><div class="muted">${label}</div><b>${value}</b>${sub ? `<div class="muted">${sub}</div>` : ""}</div>`;
    }

    function updateHeaderActions() {
      const el = document.getElementById("headerActions");
      if (!state.auth?.idToken || !isAdminToken(state.auth.idToken) || state.challenge) {
        el.innerHTML = `<a class="btn secondary" href="/">View website</a>`;
        return;
      }
      el.innerHTML = `
        <span class="user">${state.auth.email || ""}</span>
        <button type="button" class="secondary" id="hdrRefresh">Refresh</button>
        <button type="button" class="secondary" id="hdrLogout">Logout</button>
        <a class="btn secondary" href="/">Website</a>`;
      document.getElementById("hdrRefresh").onclick = () => loadAll();
      document.getElementById("hdrLogout").onclick = () => {
        saveAuth(null);
        render();
      };
    }

    function renderLogin() {
      updateHeaderActions();
      const needNewPw = state.challenge?.ChallengeName === "NEW_PASSWORD_REQUIRED";
      document.getElementById("app").innerHTML = `
        <div class="login-wrap">
          <div class="login-logo">
            <picture>
              <source type="image/webp" srcset="/img/logo-dark.webp" />
              <img src="/img/logo-dark.png" alt="Tickerplay" />
            </picture>
          </div>
          <div class="card">
            <h1 class="page-title">Admin sign in</h1>
            <p class="muted">Use your Cognito admin email and password.</p>
            <form id="loginForm" style="margin-top:16px;display:grid;gap:12px;">
              ${needNewPw ? `
                <p class="muted">Set a new password to finish first-time login.</p>
                <input type="password" id="newPassword" placeholder="New password" required minlength="10" autocomplete="new-password" />
                <button type="submit">Set password &amp; continue</button>
              ` : `
                <input type="email" id="username" placeholder="Email" required autocomplete="username" />
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
                <button type="submit">Sign in</button>
              `}
            </form>
            <div class="err" id="loginErr"></div>
          </div>
        </div>`;
      document.getElementById("loginForm").onsubmit = async (e) => {
        e.preventDefault();
        const errEl = document.getElementById("loginErr");
        errEl.textContent = "";
        try {
          if (needNewPw) {
            await completeNewPassword(document.getElementById("newPassword").value);
          } else {
            await cognitoLogin(
              document.getElementById("username").value.trim(),
              document.getElementById("password").value
            );
          }
          await loadAll();
        } catch (err) {
          if (err.message === "NEW_PASSWORD_REQUIRED") {
            render();
            return;
          }
          errEl.textContent = err.message || String(err);
        }
      };
    }

    async function loadAll() {
      state.error = "";
      try {
        const [overview, leads, visitors] = await Promise.all([
          api("/overview"),
          api("/leads"),
          api("/visitors"),
        ]);
        state.data = overview;
        state.leads = leads.leads || [];
        state.visitors = visitors.visitors || [];
      } catch (e) {
        state.error = e.message;
      }
      render();
    }

    function nav() {
      const tabs = [
        ["dashboard", "Dashboard"],
        ["leads", "Enquiries"],
        ["visitors", "Visitors"],
      ];
      return `<div class="tabs">${tabs
        .map(
          ([id, label]) =>
            `<button type="button" class="secondary ${state.view === id ? "active" : ""}" data-view="${id}">${label}</button>`
        )
        .join("")}</div>`;
    }

    function dashboard() {
      const t = state.data?.totals || {};
      const days = state.data?.trafficByDay || [];
      const max = Math.max(1, ...days.map((d) => d.pageViews));
      const top = state.data?.topPages || [];
      const recent = state.data?.recentLeads || [];
      return `
        <div class="grid">
          ${kpi("Leads (all)", t.leads ?? 0)}
          ${kpi("Leads (30d)", t.leadsLast30d ?? 0)}
          ${kpi("Page views (30d)", t.pageViewsLast30d ?? 0)}
          ${kpi("Conversion rate", (t.conversionRate ?? 0) + "%", (t.converted || 0) + " converted")}
        </div>
        <div class="card">
          <h2>Traffic (30 days)</h2>
          ${
            days.length
              ? days
                  .map(
                    (d) => `
            <div style="margin:10px 0;">
              <div class="row" style="justify-content:space-between;"><span class="muted">${d.day}</span><span>${d.pageViews}</span></div>
              <div class="meter"><i style="width:${Math.round((d.pageViews / max) * 100)}%"></i></div>
            </div>`
                  )
                  .join("")
              : '<p class="muted">No page views yet.</p>'
          }
        </div>
        <div class="card">
          <h2>Top pages</h2>
          <table><thead><tr><th>Path</th><th>Views</th></tr></thead>
          <tbody>${
            top.map((p) => `<tr><td>${p.path}</td><td>${p.count}</td></tr>`).join("") ||
            '<tr><td colspan="2" class="muted">No data</td></tr>'
          }</tbody></table>
        </div>
        <div class="card">
          <h2>Newest enquiries</h2>
          <table><thead><tr><th>When</th><th>Contact</th><th>Status</th><th>Message</th></tr></thead>
          <tbody>${
            recent
              .map(
                (l) => `<tr>
            <td class="muted">${(l.createdAt || "").replace("T", " ").slice(0, 16)}</td>
            <td><b>${l.name || "—"}</b><br/><span class="muted">${l.email || ""} ${l.mobile || ""}</span></td>
            <td><span class="pill ${l.status || "new"}">${l.status || "new"}</span></td>
            <td>${(l.message || l.company || "—").toString().slice(0, 120)}</td>
          </tr>`
              )
              .join("") || '<tr><td colspan="4" class="muted">No leads yet</td></tr>'
          }</tbody></table>
        </div>`;
    }

    function leadsView() {
      return `<div class="card">
        <div class="row" style="justify-content:space-between;">
          <h2>Enquiry pipeline</h2>
          <span class="muted">${state.leads.length} total</span>
        </div>
        <table>
          <thead><tr><th>Date</th><th>Lead</th><th>Source</th><th>Status</th><th>Notes</th><th></th></tr></thead>
          <tbody>
          ${
            state.leads
              .map(
                (l) => `
            <tr>
              <td class="muted">${(l.createdAt || "").slice(0, 10)}</td>
              <td><b>${l.name || "—"}</b><br/><span class="muted">${l.email || ""}<br/>${l.mobile || ""}<br/>${l.country || ""}</span><div>${(l.message || "").slice(0, 160)}</div></td>
              <td>${l.source || "website"}</td>
              <td>
                <select data-id="${l.id}" class="status">
                  ${["new", "contacted", "follow_up", "converted", "closed"]
                    .map(
                      (s) =>
                        `<option value="${s}" ${(l.status || "new") === s ? "selected" : ""}>${s}</option>`
                    )
                    .join("")}
                </select>
              </td>
              <td><textarea data-id="${l.id}" class="notes" rows="2">${l.adminNotes || ""}</textarea></td>
              <td><button type="button" data-id="${l.id}" class="save secondary">Save</button></td>
            </tr>`
              )
              .join("") || '<tr><td colspan="6" class="muted">No enquiries yet</td></tr>'
          }
          </tbody>
        </table>
      </div>`;
    }

    function visitorsView() {
      return `<div class="card">
        <h2>Recent visitors</h2>
        <table><thead><tr><th>Time</th><th>Path</th><th>Session</th><th>Referrer</th></tr></thead>
        <tbody>${
          state.visitors
            .slice(0, 200)
            .map(
              (v) => `<tr>
          <td class="muted">${(v.createdAt || "").replace("T", " ").slice(0, 19)}</td>
          <td>${v.path || ""}</td>
          <td class="muted">${(v.sessionId || "").slice(0, 10)}</td>
          <td class="muted">${(v.referrer || "—").toString().slice(0, 60)}</td>
        </tr>`
            )
            .join("") || '<tr><td colspan="4" class="muted">No visitor events yet</td></tr>'
        }</tbody></table>
      </div>`;
    }

    function render() {
      if (!state.auth?.idToken || !isAdminToken(state.auth.idToken) || state.challenge) {
        return renderLogin();
      }
      updateHeaderActions();
      const body =
        state.view === "leads" ? leadsView() : state.view === "visitors" ? visitorsView() : dashboard();
      document.getElementById("app").innerHTML = `
        <h1 class="page-title">Dashboard</h1>
        <p class="muted" style="margin-bottom:16px;">Track website traffic and convert enquiries into projects.</p>
        ${nav()}
        ${state.error ? `<div class="err" style="margin-bottom:12px;">${state.error}</div>` : ""}
        ${body}`;
      document.querySelectorAll("[data-view]").forEach(
        (b) =>
          (b.onclick = () => {
            state.view = b.dataset.view;
            render();
          })
      );
      document.querySelectorAll("button.save").forEach(
        (btn) =>
          (btn.onclick = async () => {
            const id = btn.dataset.id;
            const status = document.querySelector(`select.status[data-id="${id}"]`).value;
            const adminNotes = document.querySelector(`textarea.notes[data-id="${id}"]`).value;
            await api("/leads/" + encodeURIComponent(id), {
              method: "PATCH",
              body: JSON.stringify({ status, adminNotes }),
            });
            await loadAll();
          })
      );
    }

    if (state.auth?.idToken && isAdminToken(state.auth.idToken)) loadAll();
    else render();
  </script>
</body>
</html>
