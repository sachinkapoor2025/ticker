name: Deploy Tickerplay API

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: tickerplay-api-prod

jobs:
  deploy-api:
    name: Deploy API (SAM / Lambda)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Install API dependencies
        run: |
          npm install --omit=dev --prefix api/contact
          npm install --omit=dev --prefix api/analytics
          npm install --omit=dev --prefix api/admin

      - name: Build & deploy SAM stack
        env:
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          CONTACT_FROM_EMAIL: ${{ secrets.CONTACT_FROM_EMAIL }}
        run: |
          sam build -t infra/template.yaml
          PARAMS=("EnvironmentName=prod" "AllowedOrigin=*")
          if [ -n "$CONTACT_TO_EMAIL" ]; then PARAMS+=("ToEmail=$CONTACT_TO_EMAIL"); fi
          if [ -n "$CONTACT_FROM_EMAIL" ]; then PARAMS+=("FromEmail=$CONTACT_FROM_EMAIL"); fi
          sam deploy \
            --stack-name "$STACK_NAME" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAMS[@]}"

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs" \
            --output table
