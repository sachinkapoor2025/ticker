version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Staging Amplify apps: leave IS_PRODUCTION unset/false → robots disallow + X-Robots-Tag
        # Production Amplify app: set env IS_PRODUCTION=true in Amplify console
        - echo "IS_PRODUCTION=${IS_PRODUCTION:-false}"
        - pip3 install --user -r requirements-seo.txt || pip install -r requirements-seo.txt
        - python3 scripts/content_quality.py
        - python3 scripts/optimize_images.py
        - python3 scripts/apply_keywords.py
        - python3 scripts/seo_build.py
    build:
      commands:
        - echo "Static site ready (SEO assets generated)"
  artifacts:
    baseDirectory: website
    files:
      - "**/*"
  cache:
    paths: []
