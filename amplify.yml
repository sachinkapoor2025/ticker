version: 1
frontend:
  phases:
    preBuild:
      commands:
        # CRITICAL: demo branches (main/dev/dev-*) must keep IS_PRODUCTION unset/false
        # so robots Disallow + X-Robots-Tag noindex protect live tickerplay.com rankings.
        # Only a dedicated production Amplify app should set IS_PRODUCTION=true.
        - echo "IS_PRODUCTION=${IS_PRODUCTION:-false}"
        - |
          if [ "${IS_PRODUCTION:-false}" = "true" ]; then
            echo "WARNING: IS_PRODUCTION=true — this build will be crawlable like production"
          else
            echo "Demo/staging build: search engines blocked (noindex + robots Disallow)"
          fi
        - pip3 install --user -r requirements-seo.txt || pip install -r requirements-seo.txt
        - python3 scripts/content_quality.py
        - python3 scripts/optimize_images.py
        - python3 scripts/apply_keywords.py
        - python3 scripts/seo_build.py
        - python3 scripts/build_search_index.py
        - python3 scripts/restructure_scannable.py
        - python3 scripts/inject_ux_assets.py
        - python3 scripts/write_admin_config.py
    build:
      commands:
        - echo "Static site ready (SEO assets generated)"
  artifacts:
    baseDirectory: website
    files:
      - "**/*"
  cache:
    paths: []
