customHeaders:
  - pattern: '**'
    headers:
      - key: 'X-Robots-Tag'
        value: 'noindex, nofollow'
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains; preload'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'camera=(), microphone=(), geolocation=()'
      - key: 'Content-Security-Policy'
        value: 'default-src ''self'' https: data: blob:; script-src ''self'' ''unsafe-inline'' ''unsafe-eval'' https:; style-src ''self'' ''unsafe-inline'' https:; img-src ''self'' data: https: blob:; font-src ''self'' data: https:; connect-src ''self'' https:; frame-src https:; media-src ''self'' https: blob:;'
  - pattern: '/css/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/js/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/img/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/fonts/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
