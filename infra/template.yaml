AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Tickerplay API — contact, analytics, Cognito admin dashboard

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
  FromEmail:
    Type: String
    Default: ""
  ToEmail:
    Type: String
    Default: ""
  AllowedOrigin:
    Type: String
    Default: "*"

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 20
    MemorySize: 256
    Architectures:
      - arm64

Resources:
  LeadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub tickerplay-leads-${EnvironmentName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  AnalyticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub tickerplay-analytics-${EnvironmentName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub tickerplay-users-${EnvironmentName}
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      Policies:
        PasswordPolicy:
          MinimumLength: 10
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Schema:
        - Name: email
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub tickerplay-admin-web-${EnvironmentName}
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 12
      IdTokenValidity: 12
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref UserPool
      Description: Tickerplay admin dashboard access (/ticker-admin)

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref EnvironmentName
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS

  ContactFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub tickerplay-contact-${EnvironmentName}
      CodeUri: ../api/contact/
      Handler: handler.handler
      Environment:
        Variables:
          LEADS_TABLE: !Ref LeadsTable
          FROM_EMAIL: !Ref FromEmail
          TO_EMAIL: !Ref ToEmail
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeadsTable
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        ContactPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/contact
            Method: POST
        ContactOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/contact
            Method: OPTIONS

  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub tickerplay-analytics-${EnvironmentName}
      CodeUri: ../api/analytics/
      Handler: handler.handler
      Environment:
        Variables:
          ANALYTICS_TABLE: !Ref AnalyticsTable
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalyticsTable
      Events:
        AnalyticsPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/analytics
            Method: POST
        AnalyticsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/analytics
            Method: OPTIONS

  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub tickerplay-admin-${EnvironmentName}
      CodeUri: ../api/admin/
      Handler: handler.handler
      Environment:
        Variables:
          LEADS_TABLE: !Ref LeadsTable
          ANALYTICS_TABLE: !Ref AnalyticsTable
          USER_POOL_ID: !Ref UserPool
          USER_POOL_CLIENT_ID: !Ref UserPoolClient
          ALLOWED_ORIGIN: !Ref AllowedOrigin
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LeadsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AnalyticsTable
      Events:
        AdminOverview:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/overview
            Method: GET
        AdminOverviewOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/overview
            Method: OPTIONS
        AdminLeads:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/leads
            Method: GET
        AdminLeadsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/leads
            Method: OPTIONS
        AdminLeadPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/leads/{id}
            Method: PATCH
        AdminLeadPatchOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/leads/{id}
            Method: OPTIONS
        AdminVisitors:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/visitors
            Method: GET
        AdminVisitorsOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/visitors
            Method: OPTIONS
        AdminMe:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/me
            Method: GET
        AdminMeOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/admin/me
            Method: OPTIONS

Outputs:
  ApiUrl:
    Description: HTTP API base URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}
  ContactEndpoint:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/api/contact
  AnalyticsEndpoint:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/api/analytics
  AdminApiBase:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${EnvironmentName}/api/admin
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  LeadsTableName:
    Value: !Ref LeadsTable
  AnalyticsTableName:
    Value: !Ref AnalyticsTable
